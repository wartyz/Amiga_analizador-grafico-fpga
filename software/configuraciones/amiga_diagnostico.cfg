# ╔══════════════════════════════════════════════════════════════════╗
# ║  amiga_diagnostico.cfg                                           ║
# ║  Sondas diagnóstico del bug CIA-A en AmigaW3                    ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── CONEXIÓN ──────────────────────────────────────────────────────
puerto      /dev/ttyUSB1     # PL2303 del analizador
baud        2000000

# ── CAPTURA ────────────────────────────────────────────────────────
test        false
consola     false

# ── TRIGGER ────────────────────────────────────────────────────────
# Manual: captura inmediata del estado actual del bus
trigger     manual
trigger_ch  CH00

# ── VISUALIZACIÓN ──────────────────────────────────────────────────
zoom        0.92
zoom_min    0.10
pan_fraction 0.125
ch_height   60.0
sample_freq 28375000

# ── CANALES ────────────────────────────────────────────────────────
# Señales internas disponibles en amigaw3_top.vhd:
#   internal_0  = en_phi1            reloj efectivo CPU 7MHz
#   internal_1  = system_ready       sale del reset?
#   internal_2  = cpu_as             Address Strobe (activo bajo)
#   internal_3  = cpu_rw             1=read, 0=write
#   internal_4  = cpu_dtack          1=no listo, 0=listo
#   internal_5  = bus_state(0)
#   internal_6  = bus_state(1)
#   internal_7  = sel_rom            acceso a Kickstart
#   internal_8  = sel_ram            acceso a Chip RAM
#   internal_9  = sel_ciaa           ¿toca la CIA-A?  ← CLAVE
#   internal_10 = overlay
#   internal_11 = vblank_pulse
#   internal_12 = cpu_halt
#   internal_13 = ciaa_irq
#   internal_14 = ram_we(0)
#   internal_15 = ram_we(1)

CH00    PHI1      internal_0    true     # reloj CPU como referencia
CH01    READY     internal_1    false    # system_ready
CH02    AS        internal_2    false    # Address Strobe (clave)
CH03    RW        internal_3    false    # Read/Write
CH04    DTACK     internal_4    false    # Data Acknowledge
CH05    SEL_ROM   internal_7    false    # acceso ROM
CH06    SEL_CIAA  internal_9    false    # acceso CIA-A (CLAVE DEL BUG)
CH07    OVERLAY   internal_10   false    # overlay
