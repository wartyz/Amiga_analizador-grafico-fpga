# ╔══════════════════════════════════════════════════════════════════╗
# ║  amiga_diag3.cfg                                                 ║
# ║  Captura 3: trigger en CIA-A                                     ║
# ║  Si Rust se queda colgado = CIA nunca se accede más             ║
# ╚══════════════════════════════════════════════════════════════════╝

puerto      /dev/ttyUSB1
baud        2000000
test        false
consola     false

# Trigger: rising edge de SEL_CIAA
# Si dispara → captura el momento exacto del acceso
# Si NO dispara → CIA nunca accedida
trigger     rising
trigger_ch  CH06

zoom        0.92
zoom_min    0.10
pan_fraction 0.125
ch_height   60.0
sample_freq 28375000

CH00    PHI1      internal_0    true     # reloj
CH01    AS        internal_2    false    # ciclo
CH02    RW        internal_3    false    # read/write
CH03    DTACK     internal_4    false    # ack
CH04    SEL_ROM   internal_7    false    # ROM
CH05    SEL_RAM   internal_8    false    # RAM
CH06    SEL_CIAA  internal_9    false    # CIA-A (TRIGGER)
CH07    OVERLAY   internal_10   false    # overlay
