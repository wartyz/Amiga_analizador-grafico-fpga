# ╔══════════════════════════════════════════════════════════════════╗
# ║  amiga_diag2.cfg                                                 ║
# ║  Captura 2: ¿qué accede la CPU cuando NO está en ROM?           ║
# ╚══════════════════════════════════════════════════════════════════╝

puerto      /dev/ttyUSB1
baud        2000000
test        false
consola     false

# Manual: estado actual del bus
trigger     manual
trigger_ch  CH00

zoom        0.92
zoom_min    0.10
pan_fraction 0.125
ch_height   60.0
sample_freq 28375000

# Sondas para identificar el "no-ROM"
CH00    PHI1      internal_0    true     # reloj
CH01    AS        internal_2    false    # ciclo en curso
CH02    RW        internal_3    false    # read/write
CH03    DTACK     internal_4    false    # ack
CH04    SEL_ROM   internal_7    false    # acceso ROM
CH05    SEL_RAM   internal_8    false    # acceso Chip RAM
CH06    SEL_CIAA  internal_9    false    # acceso CIA-A
CH07    OVERLAY   internal_10   false    # estado overlay
