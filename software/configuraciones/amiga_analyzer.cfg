# ╔══════════════════════════════════════════════════════════════════╗
# ║  amiga_analyzer.cfg                                              ║
# ║  Analizador lógico para diagnosticar arranque del Amiga          ║
# ║  Sondea señales del bus 68000 + chipset                          ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── CONEXIÓN ──────────────────────────────────────────────────────
puerto      /dev/ttyUSB1     # PL2303 (NO el ttyUSB0 del CH340)
baud        921600           # PL2303 antiguo, max seguro

# ── CAPTURA ────────────────────────────────────────────────────────
test        false
consola     false

# ── TRIGGER ────────────────────────────────────────────────────────
# Disparar cuando la CPU sale de reset:
trigger     rising
trigger_ch  CH01            # CH01 = system_ready

# ── VISUALIZACIÓN ──────────────────────────────────────────────────
zoom        0.90
zoom_min    0.10
pan_fraction 0.125
ch_height   60.0            # canales más estrechos para ver los 8 a la vez
sample_freq 28375000        # Hz (clk_28m del AmigaW3)

# ── CANALES ────────────────────────────────────────────────────────
# Señales internas del AmigaW3 disponibles:
#   internal_0  = en_phi1            (clock efectivo CPU 7MHz)
#   internal_1  = system_ready       (sale del reset?)
#   internal_2  = cpu_as             (Address Strobe activo bajo)
#   internal_3  = cpu_rw             (1=read, 0=write)
#   internal_4  = cpu_dtack          (1=no listo, 0=listo)
#   internal_5  = bus_state(0)       (LSB FSM bus)
#   internal_6  = bus_state(1)       (MSB FSM bus)
#   internal_7  = sel_rom            (acceso a Kickstart)
#   internal_8  = sel_ram            (acceso a Chip RAM)
#   internal_9  = sel_ciaa           (¿toca la CIA-A?) ← clave del bug
#   internal_10 = overlay            (overlay activo)
#   internal_11 = vblank_pulse       (referencia temporal)
#   internal_12 = cpu_halt           (CPU colgada)
#   internal_13 = ciaa_irq           (CIA genera IRQ)
#   internal_14 = ram_we(0)          (escritura byte bajo RAM)
#   internal_15 = ram_we(1)          (escritura byte alto RAM)

# Sondeo inicial: 8 señales más relevantes
CH00    PHI1     internal_0   true       # reloj CPU como referencia
CH01    READY    internal_1   false      # sistema listo (trigger)
CH02    AS       internal_2   false      # Address Strobe
CH03    RW       internal_3   false      # Read/Write
CH04    DTACK    internal_4   false      # Data Acknowledge
CH05    SEL_ROM  internal_7   false      # acceso Kickstart
CH06    SEL_CIAA internal_9   false      # acceso CIA-A (clave)
CH07    OVERLAY  internal_10  false      # overlay
