# esp32_spi.cfg
# Prueba: SPI simulado generado por ESP32
# Conexiones físicas: GPIO 4,5,6 → PMOD J13 N22,N21,R20

# ── CONEXIÓN ────────────────────────────────────────────
puerto      /dev/ttyUSB0
baud        2000000

# ── CAPTURA ─────────────────────────────────────────────
test        false
consola     false

# ── TRIGGER ─────────────────────────────────────────────
trigger     falling
trigger_ch  CH02

# ── VISUALIZACIÓN ───────────────────────────────────────
zoom        0.90
zoom_min    0.10
pan_fraction 0.125
ch_height   70.0
sample_freq 28328980

# ── CANALES ─────────────────────────────────────────────
CH00    PIN_A    gpio_4    true
CH01    PIN_B    gpio_5    false
CH02    PIN_C    gpio_6    false
CH03    PIN_D    gpio_7    false
CH04
CH05
CH06
CH07
