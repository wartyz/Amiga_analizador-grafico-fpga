# ╔═══════════════════════════════════════════════════════════════════╗
# ║  PLANTILLA  logic_analyzer.cfg                                    ║
# ║  Copia este fichero, renómbralo y modifica los valores           ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# Uso:
#   logic_analyzer                    busca logic_analyzer.cfg aquí
#   logic_analyzer mi_prueba.cfg      usa el fichero especificado
#   logic_analyzer --plantilla        muestra esta plantilla

# ── CONEXIÓN ────────────────────────────────────────────────────────
puerto      /dev/ttyUSB0     # puerto serie de la FPGA
baud        2000000          # velocidad (max seguro CH340N: 2000000)

# ── CAPTURA ─────────────────────────────────────────────────────────
test        false            # true = generador interno FPGA (sin hardware externo)
consola     false            # true = salida por terminal en lugar de GUI

# ── TRIGGER ─────────────────────────────────────────────────────────
trigger     manual           # manual | rising | falling
trigger_ch  CH00             # canal de trigger (CH00..CH07)

# ── VISUALIZACIÓN ───────────────────────────────────────────────────
zoom        0.90             # factor zoom rueda ratón (0.70 rápido - 0.99 lento)
zoom_min    0.10             # zoom máximo acercamiento (muestras/pixel mínimo)
pan_fraction 0.125           # fracción ventana por tecla flecha izq/der
ch_height   70.0             # altura de cada canal en pixels
sample_freq 28328980         # frecuencia muestreo Hz (debe coincidir con VHDL)

# ── CANALES ─────────────────────────────────────────────────────────
# Formato: CHnn  nombre  fuente  reloj
#
# CHnn   : identificador fijo CH00..CH07 (referencia, no aparece en GUI)
# nombre : texto libre sin espacios (aparece en la GUI)
# fuente : internal_N | gpio_N | probe_N | none
#            internal_N = señal interna de la FPGA (ver tabla en VHDL)
#            gpio_N     = pin GPIO externo (ESP32/Arduino)
#            probe_N    = pin físico PMOD
# reloj  : true | false (solo un canal puede ser reloj)
#
# Línea con solo CHnn (sin nombre) = canal vacío / no usado
#
# Señales internas disponibles (definidas en top_analisis.vhd):
#   internal_0 = dut_inputs(0)    entrada A del DUT
#   internal_1 = dut_inputs(1)    entrada B del DUT
#   internal_2 = dut_outputs(0)   salida del DUT
#   internal_3..15 = reservadas

CH00 CLK     gpio_4      true
CH01 DATA5   gpio_5      false
CH02 DATA6   gpio_6      false
CH03
CH04
CH05
CH06
CH07
